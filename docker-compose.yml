services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./evals:/app/evals

  mcp:
    build:
      context: .
      dockerfile: mcp_servers/Dockerfile
    ports:
      - "8100:8100"
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      - VITE_API_BASE=http://localhost:8000
    ports:
      - "3000:5173"
    depends_on:
      - backend
      - mcp

  # Health: backend /api/health includes MCP status; mcp exposes /mcp/health
